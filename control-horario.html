<html lang="es">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2433;
    --border: rgba(255,255,255,0.07);
    --accent: #3b7fff;
    --accent2: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #e8eaf0;
    --text2: #8b91a8;
    --text3: #555d78;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #fff;
  }
  .logo-text { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.02em; }
  .logo-text strong { color: var(--text); font-weight: 600; }

  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px 6px 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .user-pill:hover { border-color: var(--accent); }
  .user-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 600; color: #fff;
  }
  .user-name { font-size: 12px; font-weight: 500; color: var(--text2); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;

    font-size: 28px; margin: 0 auto 24px;

    display: flex; align-items: center; justify-content: center; gap: 10px;

  /* ── STATUS CARD ── */
  .status-card {

    border: 1px solid var(--border);

    padding: 24px;

    display: flex; gap: 8px; margin-top: 10px;

  .reg-sync.pending { color: var(--warning); }
  .reg-time {

    font-size: 13px; color: var(--text2);

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);

    font-size: 14px; font-weight: 500;

    white-space: nowrap; max-width: 90vw;

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent2); color: var(--accent2); }
  #toast.error { border-color: var(--danger); color: var(--danger); }
  #toast.info { border-color: var(--accent); color: var(--accent); }

  /* ── SPINNER ── */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ADMIN PANEL ── */
  .admin-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    margin-bottom: 8px; transition: border-color 0.2s;

  .admin-toggle:hover { border-color: rgba(255,255,255,0.15); }
  .admin-toggle span { font-size: 13px; font-weight: 500; color: var(--text2); }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1; padding: 8px; text-align: center;
    font-size: 13px; font-weight: 500; color: var(--text2);
    border-radius: 7px; cursor: pointer; transition: all 0.2s;
    border: none; background: none; font-family: 'DM Sans', sans-serif;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-box .val { font-size: 24px; font-weight: 600; }
  .stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  .btn-export {
    width: 100%; padding: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text2);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  .empty-state {
    text-align: center; padding: 32px 20px;
    color: var(--text3); font-size: 14px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  @media (max-width: 400px) {
    .clock { font-size: 36px; }
    header { padding: 12px 16px; }
    #app { padding: 16px; }
  }
</style>

<!-- ═══ SCRIPT ═══ -->
<script>
// ── Estado global
let accessToken = null;
let currentUser = null;
let siteId      = null;
let listId      = null;
let estadoActual = null; // 'libre' | 'trabajando'
let registrosHoy = [];
let isAdmin = false;
let adminVisible = false;

// ═══════════════════════════════
// PKCE HELPERS
// ═══════════════════════════════
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generatePKCE() {
  const verifier = base64url(crypto.getRandomValues(new Uint8Array(32)));
  const hashed   = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = base64url(hashed);
  return { verifier, challenge };
}

// ═══════════════════════════════
// AUTH
// ═══════════════════════════════
async function login() {
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('pkce_verifier', verifier);
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('oauth_state', state);

  const params = new URLSearchParams({
    client_id:             CONFIG.clientId,
    response_type:         'code',
    redirect_uri:          CONFIG.redirectUri,
    scope:                 CONFIG.scopes.join(' ') + ' offline_access openid profile',
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    state,
    response_mode:         'query'
  });
  window.location.href = `https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/authorize?${params}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id:     CONFIG.clientId,
    grant_type:    'authorization_code',
    code,
    redirect_uri:  CONFIG.redirectUri,
    code_verifier: verifier,
    scope:         CONFIG.scopes.join(' ') + ' offline_access openid profile'
  });
  const r = await fetch(`https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/token`, {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body
  });
  if (!r.ok) throw new Error('Token exchange failed');
  const data = await r.json();
  accessToken = data.access_token;
  if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
  localStorage.setItem('access_token', data.access_token);
  localStorage.setItem('token_exp', Date.now() + (data.expires_in - 60)*1000);
}

async function refreshToken() {
  const rt = localStorage.getItem('refresh_token');
  if (!rt) return false;
  try {
    const body = new URLSearchParams({
      client_id:     CONFIG.clientId,
      grant_type:    'refresh_token',
      refresh_token: rt,
      scope:         CONFIG.scopes.join(' ') + ' offline_access openid profile'
    });
    const r = await fetch(`https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/token`, {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
    });
    if (!r.ok) return false;
    const data = await r.json();
    accessToken = data.access_token;
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('token_exp', Date.now() + (data.expires_in - 60)*1000);
    if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
    return true;
  } catch { return false; }
}

async function ensureToken() {
  const exp = parseInt(localStorage.getItem('token_exp') || '0');
  if (Date.now() < exp && accessToken) return true;
  accessToken = localStorage.getItem('access_token');
  if (accessToken && Date.now() < exp) return true;
  return await refreshToken();
}

function logout() {
  localStorage.clear(); sessionStorage.clear();
  window.location.href = `https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/logout?post_logout_redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}`;
}

// ═══════════════════════════════
// GRAPH API
// ═══════════════════════════════
async function graph(path, opts={}) {
  await ensureToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
  if (!r.ok) {
    const err = await r.json().catch(()=>({}));
    throw new Error(err.error?.message || `Graph error ${r.status}`);
  }
  if (r.status === 204) return null;
  return r.json();
}

async function initSharePoint() {
  // Obtener siteId
  const encoded = encodeURIComponent('eurolabcsp.sharepoint.com:/sites/Control_horario:');
  const site = await graph(`/sites/eurolabcsp.sharepoint.com:/sites/Control_horario:`);
  siteId = site.id;

  // Buscar o crear lista
  const lists = await graph(`/sites/${siteId}/lists?$filter=displayName eq '${CONFIG.listName}'`);
  if (lists.value.length > 0) {
    listId = lists.value[0].id;
  } else {
    const newList = await graph(`/sites/${siteId}/lists`, {
      method: 'POST',
      body: JSON.stringify({
        displayName: CONFIG.listName,
        columns: [
          { name: 'Usuario',      text: {} },
          { name: 'Email',        text: {} },
          { name: 'Tipo',         text: {} },  // ENTRADA | SALIDA | INCIDENCIA
          { name: 'Timestamp',    dateTime: { displayAs: 'default' } },
          { name: 'Observacion',  text: {} },
          { name: 'Dispositivo',  text: {} }
        ],
        list: { template: 'genericList' }
      })
    });
    listId = newList.id;
  }
}

async function crearRegistro(tipo, obs='') {
  const now = new Date();
  return graph(`/sites/${siteId}/lists/${listId}/items`, {
    method: 'POST',
    body: JSON.stringify({
      fields: {
        Usuario:     currentUser.displayName,
        Email:       currentUser.mail || currentUser.userPrincipalName,
        Tipo:        tipo,
        Timestamp:   now.toISOString(),
        Observacion: obs,
        Dispositivo: navigator.userAgent.substring(0,100)
      }
    })
  });
}

async function obtenerRegistrosHoy(email) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const iso = hoy.toISOString();
  const filter = encodeURIComponent(`fields/Email eq '${email}' and fields/Timestamp ge '${iso}'`);
  const r = await graph(`/sites/${siteId}/lists/${listId}/items?$filter=${filter}&$orderby=fields/Timestamp asc&$top=50&expand=fields`);
  return r.value || [];
}

async function obtenerTodosRegistros() {
  const r = await graph(`/sites/${siteId}/lists/${listId}/items?$orderby=fields/Timestamp desc&$top=200&expand=fields`);
  return r.value || [];
}

// ═══════════════════════════════
// UI
// ═══════════════════════════════
function showToast(msg, type='info', ms=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(()=>{ t.className=''; }, ms);
}

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dateStr').textContent =
    now.toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

function renderEstado() {
  const card  = document.getElementById('estadoCard');
  const valor = document.getElementById('estadoValor');
  const sub   = document.getElementById('estadoSub');
  const btn   = document.getElementById('btnFichar');
  const txt   = document.getElementById('btnText');

  if (estadoActual === 'trabajando') {
    card.className = 'status-card checked-in';
    valor.textContent = '🟢 En jornada';
    const ult = registrosHoy.filter(r=>r.fields.Tipo==='ENTRADA').pop();
    sub.textContent = ult ? `Desde ${new Date(ult.fields.Timestamp).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}` : '';
    btn.className = 'btn-fichar salida'; txt.textContent = 'Registrar salida';
  } else {
    card.className = 'status-card checked-out';
    valor.textContent = registrosHoy.length ? '⚫ Jornada finalizada' : '⚪ Sin fichar';
    sub.textContent = registrosHoy.length ? 'Puedes registrar nueva entrada si es necesario' : 'Pulsa el botón para iniciar tu jornada';
    btn.className = 'btn-fichar entrada'; txt.textContent = 'Registrar entrada';
  }
  btn.disabled = false;
}

function renderHistorial() {
  const el = document.getElementById('historialHoy');
  if (!registrosHoy.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Sin registros hoy</div>';
    return;
  }
  el.innerHTML = registrosHoy.slice().reverse().map(r => {
    const f = r.fields;
    const hora = new Date(f.Timestamp).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    const tipo = f.Tipo === 'ENTRADA' ? 'Entrada' : f.Tipo === 'SALIDA' ? 'Salida' : 'Incidencia';
    const dotClass = f.Tipo === 'ENTRADA' ? '' : f.Tipo === 'SALIDA' ? 'salida' : 'incidencia';
    return `
    <div class="registro">
      <div class="reg-dot ${dotClass}"></div>
      <div class="reg-info">
        <div class="reg-tipo">${tipo}</div>
        ${f.Observacion ? `<div class="reg-obs">${f.Observacion}</div>` : ''}
      </div>
      <div class="reg-time">${hora}<br><span class="reg-sync synced" style="font-size:10px">✓ sync</span></div>
    </div>`;
  }).join('');
}

function calcularEstado() {
  let dentro = false;
  for (const r of registrosHoy) {
    if (r.fields.Tipo === 'ENTRADA') dentro = true;
    if (r.fields.Tipo === 'SALIDA')  dentro = false;
  }
  estadoActual = dentro ? 'trabajando' : 'libre';
}

async function fichar() {
  const btn = document.getElementById('btnFichar');
  const spinner = document.getElementById('btnSpinner');
  const txt = document.getElementById('btnText');
  const obs = document.getElementById('obsInput').value.trim();

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  txt.textContent = 'Registrando...';

  try {
    const tipo = estadoActual === 'trabajando' ? 'SALIDA' : 'ENTRADA';
    await crearRegistro(tipo, obs);
    document.getElementById('obsInput').value = '';

    // Recargar
    registrosHoy = await obtenerRegistrosHoy(currentUser.mail || currentUser.userPrincipalName);
    calcularEstado();
    renderEstado();
    renderHistorial();
    showToast(tipo === 'ENTRADA' ? '✅ Entrada registrada' : '✅ Salida registrada', 'success');
  } catch(e) {
    showToast('Error al registrar: ' + e.message, 'error', 5000);
    renderEstado();
  }
}

// ── ADMIN
function toggleAdmin() {
  adminVisible = !adminVisible;
  document.getElementById('adminPanel').style.display = adminVisible ? 'block' : 'none';
  document.getElementById('adminArrow').textContent = adminVisible ? '▲' : '▼';
  if (adminVisible) loadAdmin();
}

let currentTab = 'resumen';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.className = 'tab' + ((['resumen','todos'][i]===tab)?' active':'');
  });
  document.getElementById('tabResumen').style.display = tab==='resumen'?'block':'none';
  document.getElementById('tabTodos').style.display   = tab==='todos'?'block':'none';
  if (tab==='todos') loadTodos();
}

async function loadAdmin() {
  try {
    const todos = await obtenerTodosRegistros();
    // Stats del mes
    const mesActual = new Date().getMonth();
    const mesR = todos.filter(r=>new Date(r.fields.Timestamp).getMonth()===mesActual);
    const usuarios = [...new Set(mesR.map(r=>r.fields.Email))];
    const entradas = mesR.filter(r=>r.fields.Tipo==='ENTRADA').length;
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-box"><div class="val">${usuarios.length}</div><div class="lbl">Empleados activos</div></div>
      <div class="stat-box"><div class="val">${entradas}</div><div class="lbl">Entradas este mes</div></div>
      <div class="stat-box"><div class="val">${mesR.filter(r=>r.fields.Tipo==='SALIDA').length}</div><div class="lbl">Salidas este mes</div></div>
      <div class="stat-box"><div class="val">${mesR.filter(r=>r.fields.Observacion).length}</div><div class="lbl">Con observación</div></div>
    `;
  } catch(e) { showToast('Error cargando stats', 'error'); }
}

async function loadTodos() {
  const el = document.getElementById('todosRegistros');
  el.innerHTML = '<div class="empty-state">Cargando...</div>';
  try {
    const todos = await obtenerTodosRegistros();
    if (!todos.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div>Sin registros</div>'; return; }
    el.innerHTML = todos.map(r=>{
      const f = r.fields;
      const dt = new Date(f.Timestamp);
      const fecha = dt.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
      const hora  = dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      const dotClass = f.Tipo==='ENTRADA'?'':'salida';
      return `
      <div class="registro">
        <div class="reg-dot ${dotClass}"></div>
        <div class="reg-info">
          <div class="reg-tipo">${f.Usuario} · ${f.Tipo}</div>
          ${f.Observacion?`<div class="reg-obs">${f.Observacion}</div>`:''}
        </div>
        <div class="reg-time">${hora}<br><span style="font-size:10px;color:var(--text3)">${fecha}</span></div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML='<div class="empty-state">Error cargando registros</div>'; }
}

async function exportCSV() {
  showToast('Preparando CSV...', 'info');
  try {
    const todos = await obtenerTodosRegistros();
    const mes = new Date().getMonth();
    const mesR = todos.filter(r=>new Date(r.fields.Timestamp).getMonth()===mes);
    const csv = ['Usuario,Email,Tipo,Fecha,Hora,Observacion',
      ...mesR.map(r=>{
        const f=r.fields; const dt=new Date(f.Timestamp);
        return `"${f.Usuario}","${f.Email}","${f.Tipo}","${dt.toLocaleDateString('es-ES')}","${dt.toLocaleTimeString('es-ES')}","${f.Observacion||''}"`;
      })
    ].join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download=`horario_${new Date().toISOString().slice(0,7)}.csv`;
    a.click();
    showToast('✅ CSV descargado', 'success');
  } catch(e) { showToast('Error exportando', 'error'); }
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
async function init() {
  setInterval(tick, 1000); tick();

  // Manejar redirect OAuth2
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');

  if (code) {
    if (state !== sessionStorage.getItem('oauth_state')) {
      showToast('Error de seguridad en autenticación', 'error'); return;
    }
    try {
      await exchangeCode(code);
      // Limpiar URL
      window.history.replaceState({}, '', window.location.pathname);
    } catch(e) {
      showToast('Error de autenticación: ' + e.message, 'error'); return;
    }
  }

  // Verificar token
  const ok = await ensureToken();
  if (!ok) return; // Mostrar login

  // Mostrar app
  try {
    currentUser = await graph('/me');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userPill').style.display = 'flex';
    document.getElementById('userName').textContent = currentUser.displayName || currentUser.mail;
    document.getElementById('userInitial').textContent = (currentUser.displayName||'U').charAt(0).toUpperCase();

    // Comprobar si es admin (miembro de admins o rol específico)
    try {
      const roles = await graph('/me/memberOf?$select=displayName');
      isAdmin = roles.value.some(g => /admin|rrhh|hr|direcci/i.test(g.displayName||''));
    } catch { isAdmin = false; }
    // Si es admin global de Entra (Javier), mostrar panel
    const myRoles = await graph('/me/transitiveMemberOf/microsoft.graph.directoryRole?$select=displayName').catch(()=>({value:[]}));
    if (myRoles.value?.some(r=>/admin/i.test(r.displayName||''))) isAdmin = true;

    if (isAdmin) document.getElementById('adminToggle').style.display = 'flex';

    // Inicializar SharePoint
    showToast('Conectando con SharePoint...', 'info', 2000);
    await initSharePoint();

    // Cargar registros hoy
    registrosHoy = await obtenerRegistrosHoy(currentUser.mail || currentUser.userPrincipalName);
    calcularEstado();
    renderEstado();
    renderHistorial();

  } catch(e) {
    showToast('Error: ' + e.message, 'error', 6000);
    console.error(e);
  }
}

init();
</script>
